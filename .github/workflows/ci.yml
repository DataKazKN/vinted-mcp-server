name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate package metadata
        run: |
          # package.json structure sanity
          node -e "
            const pkg = require('./package.json');
            const required = ['name', 'version', 'main', 'bin', 'license', 'engines'];
            const missing = required.filter(k => !pkg[k]);
            if (missing.length) {
              console.error('Missing required package.json fields:', missing);
              process.exit(1);
            }
            console.log('package.json: name=' + pkg.name + ' version=' + pkg.version);
            console.log('  main=' + pkg.main);
            console.log('  bin=' + JSON.stringify(pkg.bin));
            console.log('  license=' + pkg.license);
          "
          # Verify the published bundle exists in npm (sanity)
          npm view vinted-mcp-server version || true

      - name: Verify package can be packed
        run: npm pack --dry-run

      - name: Lint required documentation
        run: |
          test -f README.md && echo "README.md OK" || (echo "README.md missing" && exit 1)
          test -f LICENSE && echo "LICENSE OK" || (echo "LICENSE missing" && exit 1)
          test -f CONTRIBUTING.md && echo "CONTRIBUTING.md OK" || (echo "CONTRIBUTING.md missing" && exit 1)
